name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
            build_args: --win --x64
          - os: macos-latest
            artifact_name: mac-universal
            build_args: --mac --universal
          - os: ubuntu-latest
            artifact_name: linux-x64
            build_args: --linux --x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Set repository metadata
        run: npm pkg set repository="https://github.com/${{ github.repository }}.git"

      - name: Configure signing env
        shell: bash
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            {
              echo 'CSC_LINK<<EOF'
              printf '%s\n' '${{ secrets.CSC_LINK }}'
              echo 'EOF'
            } >> "$GITHUB_ENV"
          fi

          if [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]; then
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and main bundles
        run: npm run build

      - name: Package installers
        run: npm run dist -- ${{ matrix.build_args }}

      - name: Collect release files
        shell: bash
        run: |
          rm -rf dist-artifacts
          mkdir -p dist-artifacts
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const sourceRoot = path.join(process.cwd(), 'release');
          const outputRoot = path.join(process.cwd(), 'dist-artifacts');

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
                continue;
              }
              const lowerName = entry.name.toLowerCase();
              const isInstaller =
                lowerName.endsWith('.exe') ||
                lowerName.endsWith('.dmg') ||
                lowerName.endsWith('.appimage');
              const isUpdateMetadata =
                lowerName === 'latest.yml' ||
                lowerName === 'latest-mac.yml' ||
                lowerName === 'latest-linux.yml';
              const isBlockmap = lowerName.endsWith('.blockmap');
              const isHelper = lowerName === 'elevate.exe' || lowerName === 'builder-debug.yml' || lowerName === 'app-update.yml';

              if (isHelper || !(isInstaller || isUpdateMetadata || isBlockmap)) {
                continue;
              }
              fs.copyFileSync(fullPath, path.join(outputRoot, path.basename(fullPath)));
            }
          }

          if (fs.existsSync(sourceRoot)) {
            walk(sourceRoot);
          }
          NODE

      - name: Upload packaged installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-installer
          path: dist-artifacts/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
